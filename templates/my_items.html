<!DOCTYPE html>
<html>
<head>
    <title>我的交易紀錄</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="/">返回首頁</a>
            <span class="navbar-text">個人紀錄：{{ session.username }}</span>
        </div>
    </nav>
    <div class="container">
        <h4 class="mb-3">我上架的商品</h4>
        <div class="table-responsive mb-5">
            <table class="table table-white table-hover">
                <thead><tr><th>書名</th><th>價格</th><th>狀態</th></tr></thead>
                <tbody>
                    {% for p in sales %}
                    <tr>
                        <td>{{ p.title }}</td>
                        <td>${{ p.price }}</td>
                        <td>{{ '販售中' if p.status == 'Active' else '已售出' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>

        <h4 class="mb-3">我購買的商品</h4>
        <div class="table-responsive">
            <table class="table table-white table-hover border-success">
                <thead><tr><th>書名</th><th>價格</th><th>賣家</th></tr></thead>
                <tbody>
                    {% for p in purchases %}
                    <tr>
                        <td>{{ p.title }}</td>
                        <td>${{ p.price }}</td>
                        <td>{{ p.category.name }} (分類)</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
